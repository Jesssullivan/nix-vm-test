name: Rocky Budgie Session Gate Soak

on:
  pull_request:
    paths:
      - ".github/workflows/rocky-budgie-session-gate-soak.yml"
      - ".github/scripts/run-kvm-nix-build.sh"
      - "flake.nix"
      - "rocky/**"
      - "tests/default.nix"
      - "tests/rocky.nix"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/rocky-budgie-session-gate-soak.yml"
      - ".github/scripts/run-kvm-nix-build.sh"
      - "flake.nix"
      - "rocky/**"
      - "tests/default.nix"
      - "tests/rocky.nix"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rocky-budgie-late-kvm-soak-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  rocky-budgie-session-gate-soak:
    name: Prove Rocky 10.1 Budgie session-gate target
    runs-on: tinyland-nix-kvm
    timeout-minutes: 45
    steps:
      - name: Record start time
        id: timing
        run: echo "start=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Configure Tinyland Nix cache
        run: bash .github/scripts/configure-tinyland-nix-cache.sh

      - name: Verify runner environment
        run: |
          echo "Runner: ${{ runner.name }}"
          echo "OS: ${{ runner.os }}"
          echo "Environment: ${{ runner.environment }}"
          uname -a

      - name: Verify /dev/kvm access
        run: |
          ls -l /dev/kvm
          test -c /dev/kvm
          test -w /dev/kvm

      - name: Verify injected cache contract
        run: |
          test -n "${ATTIC_SERVER:-}"
          test -n "${ATTIC_CACHE:-}"
          test -n "${ATTIC_PUBLIC_KEY:-}"
          test -n "${BAZEL_REMOTE_CACHE:-}"
          test -n "${NIX_CONFIG:-}"
          printf 'ATTIC_SERVER=%s\n' "$ATTIC_SERVER"
          printf 'ATTIC_CACHE=%s\n' "$ATTIC_CACHE"
          printf 'BAZEL_REMOTE_CACHE=%s\n' "$BAZEL_REMOTE_CACHE"
          nix config show | grep -F "${ATTIC_SERVER%/}/${ATTIC_CACHE}"

      - name: Verify QEMU KVM acceleration
        run: |
          nix shell --inputs-from . nixpkgs#qemu_kvm -c sh -lc '
            qemu-system-x86_64 --version
            qemu-system-x86_64 -accel help | grep -x kvm
          '

      - name: Verify Rocky 10.1 Budgie session-gate attrs
        run: |
          nix eval --json --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
            in {
              x86_64_rocky_10_1 = builtins.hasAttr "10_1" flake.lib."x86_64-linux".rocky;
              graphical_bootstrap =
                builtins.hasAttr "rocky-10_1-graphical-bootstrap-test"
                flake.checks."x86_64-linux";
              budgie_graphical_harness =
                builtins.hasAttr "rocky-10_1-budgie-graphical-harness-test"
                flake.checks."x86_64-linux";
              budgie_session_gate =
                builtins.hasAttr "rocky-10_1-budgie-session-gate-test"
                flake.checks."x86_64-linux";
            }
          '
          nix eval --raw --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
            in if
              builtins.hasAttr "10_1" flake.lib."x86_64-linux".rocky
              && builtins.hasAttr "rocky-10_1-graphical-bootstrap-test" flake.checks."x86_64-linux"
              && builtins.hasAttr "rocky-10_1-budgie-graphical-harness-test" flake.checks."x86_64-linux"
              && builtins.hasAttr "rocky-10_1-budgie-session-gate-test" flake.checks."x86_64-linux"
            then "rocky-10.1-budgie-session-gate-ok"
            else builtins.throw "missing rocky 10_1 budgie session-gate attrs"
          '

      - name: Execute Rocky 10.1 Budgie session-gate smoke
        run: |
          bash .github/scripts/run-kvm-nix-build.sh .#checks.x86_64-linux.rocky-10_1-budgie-session-gate-test

      - name: Report timing
        if: always()
        env:
          JOB_START: ${{ steps.timing.outputs.start }}
        run: |
          END=$(date +%s%N)
          DURATION_MS=$(( (END - JOB_START) / 1000000 ))
          echo "### rocky-budgie-session-gate-soak completed in ${DURATION_MS}ms" >> "$GITHUB_STEP_SUMMARY"
